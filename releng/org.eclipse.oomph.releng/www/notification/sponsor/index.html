<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
	<meta http-equiv="content-type" content="text/html; charset=utf-8" />
	<link href="https://eclipseide.org/favicon.ico" rel="icon" type="image/x-icon" />
	<title>Sponsor the Eclipse IDE</title>
	<link rel="preconnect stylesheet" href="../notification.css?v=1.0" />
	<style>
		/* <![CDATA[*/
		#product-logo {
			max-width: 1.2em;
			margin-bottom: -0.2em;
		}

		.ide-wg-member-logo-container {
			background-color: rgba(255, 255, 255, 0.40);
		}

		a,
		a:visited,
		a:hover,
		a:active {
			color: white;
		}

		body {
			background-image: url("splash_2026.png?x");
			background-repeat: no-repeat;
			background-size: cover;
			background-attachment: fixed;
			background-position: center;
			color: white;
		}

		html,
		body {
			height: 99%;
			margin: 0;
		}

		#main {
			min-height: 100%;
		}

		#ide-wg {
			position: absolute;
			bottom: 0;
		}

		hr {
			display: none;
		}

		#general {
			margin: 5px;
		}

		.main {
			height: 100%;
		}

		#content,
		#general {
			height: 100%;
		}

		#message-container {
			height: 80%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#ide-wg label {
			font-size: 140%;
			font-weight: bolder;
		}

		#sponsor-link span {
			display: inline-block;
			animation: wave 4s ease-in-out infinite;
		}

		#sponsor-link span:nth-child(1) {
			animation-delay: 0s;
		}

		#sponsor-link span:nth-child(2) {
			animation-delay: .1s;
		}

		#sponsor-link span:nth-child(3) {
			animation-delay: .2s;
		}

		#sponsor-link span:nth-child(4) {
			animation-delay: .3s;
		}

		#sponsor-link span:nth-child(5) {
			animation-delay: .4s;
		}

		#sponsor-link span:nth-child(6) {
			animation-delay: .5s;
		}

		#sponsor-link span:nth-child(7) {
			animation-delay: .6s;
		}

		#sponsor-link span:nth-child(8) {
			animation-delay: .7s;
		}

		#sponsor-link span:nth-child(9) {
			animation-delay: .8s;
		}

		#sponsor-link span:nth-child(10) {
			animation-delay: .9s;
		}

		#sponsor-link span:nth-child(11) {
			animation-delay: 1s;
		}

		#sponsor-link span:nth-child(12) {
			animation-delay: 1.1s;
		}


		#sponsor-link span:nth-child(13) {
			animation-delay: 1.2s;
		}

		#sponsor-link span:nth-child(14) {
			animation-delay: 1.3s;
		}

		#sponsor-link span:nth-child(15) {
			animation-delay: 1.4s;
		}

		#sponsor-link span:nth-child(16) {
			animation-delay: 1.5s;
		}

		@keyframes wave {

			0%,
			100% {
				transform: translateY(2px);
			}

			50% {
				transform: translateY(-4px);
			}
		}

		.ide-wg-member-logo-container {
			height: 1.8em;
			padding: .2em .3em;
		}

		.ide-wg-member-logo {
			max-width: 6em;
			max-height: 1.8em;
		}

		@media (max-height: 20em) {

			html,
			body {
				font-size: 85%;
			}

			#ide-wg {
				font-size: 90%;
			}
		}

		@media (max-height: 15em) {

			html,
			body {
				font-size: 75%;
			}

			#ide-wg {
				font-size: 90%;
			}
		}

		/*]]>*/
	</style>
	<script src="../notification.js?v=1.5"></script>
	<script>
		//<![CDATA[
		//]]
	</script>
</head>

<body id="body">
	<div class="main">
		<div id="content">
			<table style="display: none;">
				<tbody id="query">
					<tr>
						<th>Property</th>
						<th>Value</th>
					</tr>
					<tr>
						<td>property</td>
						<td>value</td>
					</tr>
				</tbody>
			</table>

			<div id="general">
				<div id="message-container">
					<div id="message" style="padding-right: 3em; text-align: center; font-size: 1.5vh;">
						<div class="section" style="font-size:250%; margin-bottom: 0.2em;">
							<span>&#x1F496; Sponsor</span><br>
							<span style="font-size:150%">
								<img src="https://eclipse.dev/eclipse/eclipse.svg" style="width: 1em; margin-bottom: -.2ex;" /> Eclipse IDE
							</span>
						</div>
						<div class="button-section" style="font-size: 140%; padding-bottom: 20ex;">
							<label class="button">
								<a href="https://www.eclipse.org/sponsor/ide/" href="eclipse+external:https://www.eclipse.org/sponsor/ide/">&#x1F600; Now!</a>
							</label>
							&nbsp;
							<label class="button">
								<a href="eclipse+command:close">&#x1F914; Later</a>
							</label>
							&nbsp;
							<label class="button">
								<a href="eclipse+command:dismiss">&#x1F626; Freeload</a>
							</label>
						</div>
					</div>
				</div>
				<div id="ide-wg" class="section" style="display: none">
					<hr />
					Sponsored by <b>people like you</b> and by the <a href="eclipse+external:https://eclipseide.org/working-group/#about">IDE Working Group</a>.
					<br />
				</div>
				<div class="section">
				</div>
			</div>
		</div>
	</div>

	<script>
		function logoGenerationComplete() {
			const sponsorLink = document.getElementById('sponsor-link');
			if (sponsorLink != null) {
				sponsorLink.parentElement.parentElement.style.display = 'none';
			}
		}
		load();
		generate(true);
	</script>
</body>

</html>
